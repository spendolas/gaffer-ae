<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gaffer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Adobe Clean", "Segoe UI", sans-serif;
      font-size: 14px;
      background: #232323;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .clear-btn {
      background: none;
      border: 1px solid #444;
      color: #888;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      cursor: pointer;
      margin-right: 6px;
    }
    .clear-btn:hover { color: #ccc; border-color: #666; }
    .led {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c44;
      transition: background 0.3s;
    }
    .led.connected { background: #4c8; }
    .led.starting { background: #da3; }

    /* Chat */
    .chat-messages {
      flex: 1;
      overflow-y: scroll;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-messages::-webkit-scrollbar { width: 10px; }
    .chat-messages::-webkit-scrollbar-track { background: #1a1a1a; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 5px;
      border: 2px solid #1a1a1a;
    }
    .chat-messages::-webkit-scrollbar-thumb:hover { background: #555; }
    .chat-msg {
      padding: 6px 10px;
      border-radius: 6px;
      max-width: 95%;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      user-select: text;
      -webkit-user-select: text;
      cursor: text;
    }
    .chat-msg.user {
      background: #3a3a5a;
      align-self: flex-end;
      color: #ddd;
    }
    .chat-msg.assistant {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      align-self: flex-start;
      color: #ccc;
    }
    .chat-msg.error {
      border-color: #c44;
      color: #e88;
    }
    .copy-btn {
      display: block;
      background: none;
      border: none;
      color: #666;
      font-size: 9px;
      padding: 3px 0 0 0;
      cursor: pointer;
    }
    .copy-btn:active { color: #aaa; }

    /* Markdown rendering inside chat messages */
    .msg-text { display: block; }
    .msg-text h1, .msg-text h2, .msg-text h3, .msg-text h4 {
      font-weight: 600;
      margin: 8px 0 4px 0;
      color: #fafafa;
      line-height: 1.3;
    }
    .msg-text h1 { font-size: 16px; }
    .msg-text h2 { font-size: 14px; }
    .msg-text h3 { font-size: 13px; }
    .msg-text h4 { font-size: 12px; color: #ddd; }
    .msg-text p { margin: 6px 0; }
    .msg-text p:first-child { margin-top: 0; }
    .msg-text p:last-child { margin-bottom: 0; }
    .msg-text p:empty { display: none; }
    .msg-text br + br { display: none; }
    .msg-text strong { color: #fafafa; font-weight: 600; }
    .msg-text em { color: #ddd; font-style: italic; }
    .msg-text ul, .msg-text ol { margin: 2px 0 2px 18px; padding: 0; font-size: 0; }
    .msg-text li { margin: 0; font-size: 13px; line-height: 1.5; display: list-item; }
    .msg-text li > p { margin: 0; display: inline; }
    .msg-text li + li { margin-top: 2px; }
    .msg-text p + ul, .msg-text p + ol { margin-top: 0; }
    .msg-text ul + p, .msg-text ol + p { margin-top: 6px; }
    .msg-text code {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 1px 4px;
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 11px;
      color: #d8b070;
    }
    .msg-text pre {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px;
      margin: 6px 0;
      overflow-x: auto;
    }
    .msg-text pre code {
      background: transparent;
      border: 0;
      padding: 0;
      color: #d8d8d8;
      font-size: 11px;
      line-height: 1.5;
    }
    .msg-text blockquote {
      border-left: 2px solid #555;
      padding-left: 8px;
      margin: 4px 0;
      color: #aaa;
    }
    .msg-text a { color: #6ab0ff; text-decoration: none; }
    .msg-text a:hover { text-decoration: underline; }
    .msg-text table {
      border-collapse: collapse;
      margin: 6px 0;
      font-size: 11px;
      width: 100%;
    }
    .msg-text th, .msg-text td {
      border: 1px solid #3a3a3a;
      padding: 4px 8px;
      text-align: left;
    }
    .msg-text th {
      background: #2a2a2a;
      color: #fafafa;
      font-weight: 600;
    }
    .msg-text tr:nth-child(even) td { background: #232323; }
    .msg-text hr { border: 0; border-top: 1px solid #333; margin: 8px 0; }

    .tool-pill {
      display: inline-block;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 8px;
      margin: 2px 2px 2px 0;
      font-family: "SF Mono", "Consolas", monospace;
      background: #333;
      color: #999;
    }
    @keyframes pillPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .tool-pill.running { background: #3a3520; color: #da3; animation: pillPulse 1.5s ease-in-out infinite; }
    .tool-pill.done { background: #1a3520; color: #4c8; }
    .tool-pill.error { background: #3a2020; color: #c44; }
    .typing-indicator {
      color: #666;
      font-style: italic;
    }
    @keyframes blink { 50% { opacity: 0.3; } }
    .typing-dot { animation: blink 1s infinite; }

    /* Input */
    .chat-input-area {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid #333;
      flex-shrink: 0;
      flex-direction: column;
    }
    .chat-input-row {
      display: flex;
      gap: 6px;
    }
    .chat-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 8px;
      resize: none;
      outline: none;
    }
    .chat-input:focus { border-color: #666; }
    .chat-input:disabled { opacity: 0.5; }
    .send-btn, .stop-btn {
      border: none;
      color: #ddd;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .send-btn { background: #3a5a8a; }
    .send-btn:hover { background: #4a6a9a; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }
    .stop-btn { background: #8a3a3a; }
    .stop-btn:hover { background: #9a4a4a; }
    .input-hint {
      font-size: 9px;
      color: #555;
      text-align: right;
    }

    /* Activity log */
    .activity-log {
      border-top: 1px solid #333;
      padding: 4px 12px;
      flex-shrink: 0;
      font-size: 10px;
    }
    .activity-log summary {
      color: #777;
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .activity-right {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
    }
    .activity-settings {
      padding: 6px 0 4px 0;
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 10px;
      color: #999;
      border-bottom: 1px solid #2a2a2a;
      margin-bottom: 4px;
    }
    .activity-settings label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .model-select {
      background: #1a1a1a;
      border: 1px solid #444;
      color: #ddd;
      font-size: 10px;
      padding: 1px 4px;
      border-radius: 3px;
      cursor: pointer;
    }
    .update-banner {
      background: #2a3a5a;
      border-bottom: 1px solid #4a5a7a;
      padding: 6px 12px;
      font-size: 11px;
      color: #ddd;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }
    .update-banner.visible { display: flex; }
    .update-banner .actions { display: flex; gap: 4px; }
    .update-banner button {
      background: #3a5a8a;
      border: none;
      color: #fff;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 10px;
      cursor: pointer;
    }
    .update-banner button.dismiss {
      background: transparent;
      color: #aaa;
    }
    .activity-log .value {
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 10px;
      color: #888;
      padding: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="updateBanner" class="update-banner">
    <span id="updateText">Update available</span>
    <span class="actions">
      <button id="updateBtn">Update now</button>
      <button id="dismissUpdateBtn" class="dismiss">Dismiss</button>
    </span>
  </div>

  <div id="chatMessages" class="chat-messages"></div>

  <div class="chat-input-area">
    <div class="chat-input-row">
      <textarea id="chatInput" class="chat-input" placeholder="Ask Gaffer..." rows="2" disabled></textarea>
      <button id="sendBtn" class="send-btn" disabled>Send</button>
      <button id="stopBtn" class="stop-btn">Stop</button>
    </div>
    <div class="input-hint">Enter to send, Shift+Enter for newline</div>
  </div>

  <details class="activity-log">
    <summary>
      <span class="activity-left">Activity</span>
      <span class="activity-right">
        <button id="clearBtn" class="clear-btn">Clear chat</button>
        <button id="reloadBtn" class="clear-btn">Reload</button>
        <span id="led" class="led"></span>
        <span id="statusText">Starting...</span>
      </span>
    </summary>
    <div class="activity-settings">
      <label>Model:
        <select id="modelSelect" class="model-select">
          <option value="opus">Opus</option>
          <option value="sonnet">Sonnet</option>
          <option value="haiku">Haiku</option>
        </select>
      </label>
      <label><input type="checkbox" id="autoCheckUpdates"> Auto-check updates</label>
      <button id="checkNowBtn" class="clear-btn">Check now</button>
      <span id="versionText" style="margin-left:auto; color:#666;">v—</span>
    </div>
    <div id="lastJsx" class="value">-</div>
    <div id="lastResult" class="value">-</div>
  </details>

  <script src="lib/CSInterface.js"></script>
  <script src="lib/marked.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
