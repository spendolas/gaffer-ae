<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gaffer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Adobe Clean", "Segoe UI", sans-serif;
      font-size: 12px;
      background: #232323;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    .wordmark {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fafafa;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
    }
    .led {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c44;
      transition: background 0.3s;
    }
    .led.connected { background: #4c8; }
    .led.starting { background: #da3; }

    /* Chat */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-msg {
      padding: 6px 10px;
      border-radius: 6px;
      max-width: 95%;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .chat-msg.user {
      background: #3a3a5a;
      align-self: flex-end;
      color: #ddd;
    }
    .chat-msg.assistant {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      align-self: flex-start;
      color: #ccc;
    }
    .chat-msg.error {
      border-color: #c44;
      color: #e88;
    }
    .tool-indicator {
      font-size: 10px;
      color: #999;
      padding: 2px 0;
      font-family: "SF Mono", "Consolas", monospace;
    }
    .tool-indicator.running { color: #da3; }
    .tool-indicator.done { color: #4c8; }
    .tool-indicator.error { color: #c44; }

    /* Input */
    .chat-input-area {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid #333;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 8px;
      resize: none;
      outline: none;
    }
    .chat-input:focus { border-color: #666; }
    .chat-input:disabled { opacity: 0.5; }
    .send-btn {
      background: #3a5a8a;
      border: none;
      color: #ddd;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #4a6a9a; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    /* Activity log */
    .activity-log {
      border-top: 1px solid #333;
      padding: 4px 12px;
      flex-shrink: 0;
      font-size: 10px;
    }
    .activity-log summary {
      color: #777;
      cursor: pointer;
      user-select: none;
    }
    .activity-log .value {
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 10px;
      color: #888;
      padding: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="wordmark">Gaffer</span>
    <div class="status">
      <div id="led" class="led"></div>
      <span id="statusText">Starting...</span>
    </div>
  </div>

  <div id="chatMessages" class="chat-messages"></div>

  <div class="chat-input-area">
    <textarea id="chatInput" class="chat-input" placeholder="Ask Gaffer..." rows="2" disabled></textarea>
    <button id="sendBtn" class="send-btn" disabled>Send</button>
  </div>

  <details class="activity-log">
    <summary>Activity</summary>
    <div id="lastJsx" class="value">-</div>
    <div id="lastResult" class="value">-</div>
  </details>

  <script src="lib/CSInterface.js"></script>
  <script src="main.js"></script>
</body>
</html>
